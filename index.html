<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tối Ưu Core System - iOS Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="robot-container" id="main-container">
        <div class="robot-header">
            <span class="robot-name">TỐI ƯU CORE</span>
            <div class="robot-description">
                Hệ thống xử lý trung tâm <br>
                <span id="protocol-id">READY</span>
            </div>
        </div>

        <div class="robot-content">
            <div class="power-section">
                <span class="status-label">
                    <span class="active-dot"></span>
                    <span id="status-text">Shoot Bot</span>
                </span>
                <label class="cyber-switch">
                    <input type="checkbox" id="power-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
